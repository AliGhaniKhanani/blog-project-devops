version: "3.8"

services:

  blog-app:
    build: ./app
    container_name: blog-project-container
    restart: unless-stopped
    expose:
      - "3000"

    environment:
      DB_HOST: blog-db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: blogdb

    depends_on:
      - blog-db

    networks:
      - blog-network

  blog-db:
    image: postgres:15
    container_name: blog-project-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blogdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - blog-network

  nginx:
    image: nginx:latest
    container_name: blog-project-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - blog-app

    networks:
      - blog-network

volumes:
  postgres_data:

networks:
  blog-network:
